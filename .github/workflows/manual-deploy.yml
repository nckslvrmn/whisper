name: Deploy To Home

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v3.1.0)'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - uses: nckslvrmn/docker-compose-deploy@main
        with:
          file: compose.yml
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          DYNAMO_TABLE: ${{ secrets.DYNAMO_TABLE }}
          WHISPER_VERSION: ${{ inputs.version }}
