name: Deploy Image to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  push-whisper-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: "Checkout GitHub Action"
      uses: actions/checkout@v7

    - name: "Set up Docker Buildx"
      uses: docker/setup-buildx-action@v4

    - name: "Login to GitHub Container Registry"
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: "Docker metadata"
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository_owner }}/whisper
        tags: |
          type=raw,value=${{ github.ref_name }}
          type=raw,value=latest
        labels: |
          org.opencontainers.image.title=Whisper
          org.opencontainers.image.description=End-to-end encrypted secret sharing with WebAssembly-powered client-side encryption

    - name: "Build and push image"
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ github.ref_name }}
          REVISION=${{ github.sha }}
          SOURCE=${{ github.server_url }}/${{ github.repository }}

  deploy:
    needs: push-whisper-image
    runs-on: [self-hosted]
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7
    - uses: nckslvrmn/docker-compose-deploy@main
      with:
        file: compose.yml
      env:
        S3_BUCKET: ${{ secrets.S3_BUCKET }}
        DYNAMO_TABLE: ${{ secrets.DYNAMO_TABLE }}
        WHISPER_VERSION: ${{ github.ref_name }}
